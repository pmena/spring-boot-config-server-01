server:
  servlet:
    encoding: 
      charset: UTF-8
      enabled: true

spring:

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/realms/student-realm
      
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  devtools:
    livereload:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
      health:
        show-details: always
  info:
    env:
      enabled: true